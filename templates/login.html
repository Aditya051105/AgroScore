<!DOCTYPE html>
<html>
<head>

<title>AgroScore Login</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h1>AgroScore</h1>
<form id="loginForm">

    <input
        type="text"
        id="phone"
        placeholder="Phone Number"
        required>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required>

    <button type="submit">
        Login
    </button>

    <p style="margin-top: 12px; text-align: center;">
        New farmer?
        <a href="/register" style="color: #16a34a; font-weight: 600; text-decoration: none;">
            Create an account
        </a>
    </p>

</form>

<script>

document.getElementById("loginForm")
.addEventListener("submit", async(e)=>{

    e.preventDefault();

    const response = await fetch(
        "/api/auth/login",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                phone:
                document.getElementById("phone").value,

                password:
                document.getElementById("password").value
            })
        }
    );

    const data = await response.json();

    if(response.ok){

        localStorage.setItem(
            "token",
            data.token
        );

        localStorage.setItem(
            "farmer_name",
            data.name
        );

        window.location.href =
        "/dashboard";

    }else{

        alert(data.message);

    }

});

</script>
